<svg width="220" height="76" viewBox="0 0 220 76" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VoidCraft sigil dark">
  <style>
    .pixel { shape-rendering: crispEdges; }
    .pulse { animation: pulse 3.6s ease-in-out infinite; transform-origin: center; }
    .glow { animation: glow 4.2s ease-in-out infinite; transform-origin: 110px 36px; }
    @keyframes pulse {
      0%, 100% { opacity: 0.68; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-1.2px); }
    }
    @keyframes glow {
      0%, 100% { opacity: 0.22; }
      50% { opacity: 0.42; }
    }
  </style>
  <rect width="220" height="76" rx="18" fill="#0d1117"/>

  <g class="glow">
    <circle cx="110" cy="36" r="24" fill="#8b5cf6" opacity="0.22"/>
    <circle cx="110" cy="36" r="17" fill="#8b5cf6" opacity="0.30"/>
  </g>

  <path d="M82 56c18-12 39-12 56 0" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" opacity=".75"/>
  <path d="M93 60c11-7 24-7 35 0" stroke="#d946ef" stroke-width="2" stroke-linecap="round" opacity=".6"/>

  <g class="pixel pulse">
    <rect x="36" y="22" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <rect x="50" y="14" width="6" height="6" rx="1.5" fill="#d946ef"/>
    <rect x="62" y="32" width="5" height="5" rx="1.2" fill="#3fb950"/>
  </g>

  <g class="pixel pulse">
    <rect x="176" y="22" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <rect x="164" y="14" width="6" height="6" rx="1.5" fill="#d946ef"/>
    <rect x="153" y="32" width="5" height="5" rx="1.2" fill="#3fb950"/>
  </g>

  <circle cx="110" cy="36" r="14" fill="#8b5cf6"/>
  <circle cx="104" cy="32" r="12" fill="#0d1117"/>
</svg>
