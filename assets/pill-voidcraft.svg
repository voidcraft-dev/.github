<svg width="180" height="32" viewBox="0 0 180 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VoidCraft official website">
  <style>
    .pill { fill: #7c3aed; }
    .text {
      font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      fill: #ffffff;
      letter-spacing: 0.6px;
    }
    .shine { animation: shine 5s ease-in-out infinite; transform-origin: center; }
    @keyframes shine {
      0%, 100% { opacity: 0.92; }
      50% { opacity: 1; }
    }
    @media (prefers-color-scheme: dark) {
      .pill { fill: #8b5cf6; }
    }
  </style>
  <g class="shine">
    <rect class="pill" x="1" y="1" width="178" height="30" rx="15"/>
    <text x="90" y="21" text-anchor="middle" class="text">VoidCraft</text>
  </g>
</svg>
