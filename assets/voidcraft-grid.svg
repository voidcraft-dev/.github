<svg width="920" height="158" viewBox="0 0 920 158" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VoidCraft contribution grid">
  <style>
    .cell { fill: #e9edf2; }
    .soft { fill: #dfe5eb; }
    .green { fill: #2da44e; }
    .purple { fill: #7c3aed; }
    .pink { fill: #d946ef; }
    .glow { filter: drop-shadow(0 0 6px rgba(124, 58, 237, 0.30)); }
    .breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
    @keyframes breathe {
      0%, 100% { opacity: 0.88; }
      50% { opacity: 1; }
    }
  </style>

  <defs>
    <pattern id="grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect class="cell" width="12" height="12" rx="2.5"/>
    </pattern>
    <linearGradient id="bar" x1="24" y1="138" x2="896" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9BE9A8" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#40C463" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#216E39"/>
    </linearGradient>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="157" rx="18" fill="#fff"/>
  <rect x="0.5" y="0.5" width="919" height="157" rx="18" stroke="#eef1f4"/>

  <rect x="24" y="24" width="864" height="96" fill="url(#grid)"/>

  <g opacity="0.78">
    <rect class="soft" x="40" y="24" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="56" y="40" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="88" y="72" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="136" y="104" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="200" y="56" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="280" y="88" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="360" y="40" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="440" y="72" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="824" y="104" width="12" height="12" rx="2.5"/>
    <rect class="soft" x="856" y="56" width="12" height="12" rx="2.5"/>
  </g>

  <g class="glow breathe">
    <rect class="purple" x="608" y="24" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="768" y="24" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="624" y="40" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="752" y="40" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="640" y="56" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="736" y="56" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="656" y="72" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="720" y="72" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="672" y="88" width="12" height="12" rx="2.5"/>
    <rect class="purple" x="704" y="88" width="12" height="12" rx="2.5"/>
    <rect class="pink" x="688" y="104" width="12" height="12" rx="2.5"/>
  </g>

  <rect x="24" y="136" width="864" height="9" rx="2" fill="url(#bar)" opacity="0.65"/>
</svg>
